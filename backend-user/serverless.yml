service: my-serverless-backend

provider:
  name: aws
  runtime: nodejs20.x
  stage: dev
  region: us-east-1
  # Đã xóa bỏ phần environment chứa các biến ${env:...}

plugins:
  - serverless-offline

# BỔ SUNG CẤU HÌNH NÀY ĐỂ CHẠY LOCAL HTTPS
custom:
  serverless-offline:
    host: 0.0.0.0          # Cho phép iPhone kết nối qua mạng Wi-Fi
    httpPort: 3000         # Đổi port tùy ý (ví dụ: 5000) để tránh trùng với cổng mặc định khác
    httpsProtocol: "./"    # Chỉ định serverless-offline tự quét tìm file key/cert trong thư mục gốc

functions:  
  # API 1: Product Catalog
  listProducts:
    handler: src/handlers/product.listProducts
    events:
      - http:
          path: api/v1/products
          method: get
          cors: true

  # API 2: Product Detail
  getProductDetail:
    handler: src/handlers/product.getProductDetail
    events:
      - http:
          path: api/v1/products/{slug}
          method: get
          cors: true
          request:
            parameters:
              paths:
                slug: true